server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
#👉 when use in  ECS / docker-compose, nginx path is  : proxy_pass http://backend:5000;
#👉 when use in  EC2, nginx path is : proxy_pass http://localhost:5000;

    # 🔥 API Proxy (FIXED)
    location /api/ {
        proxy_pass http://devflow-alb-641807807.us-west-2.elb.amazonaws.com;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}